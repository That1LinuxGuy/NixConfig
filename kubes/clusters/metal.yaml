apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metall-config
  namespace: flux-system
spec:
  interval: 1h
  path: ./infrastructure/metal/config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb-address
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: metallb-config
  path: ./infrastructure/metal/address
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
