apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-namespaces
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./kubes/infrastructure/namespaces
  wait: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-secrets
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: infrastructure-namespaces
  path: ./kubes/infrastructure/secrets
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
  wait: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-configs
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./kubes/infrastructure/configs
  dependsOn:
    - name: infrastructure-secrets
  wait: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-apps
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./kubes/infrastructure/apps
  dependsOn:
    - name: infrastructure-configs
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
