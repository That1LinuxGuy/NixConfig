apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: romm-namespace
  namespace: flux-system
spec:
  interval: 1h
  path: ./kubes/infrastructure/romm/namespace
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: romm-config
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: romm-namespace
  path: ./kubes/infrastructure/romm/config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
