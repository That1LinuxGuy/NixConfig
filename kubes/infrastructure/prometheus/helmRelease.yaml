apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "83.x"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 12h
  # Maximum number of history revisions to keep
  maxHistory: 5
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  # Uninstall configuration
  uninstall:
    keepHistory: false
  values:
    # Prometheus configuration
    prometheus:
      prometheusSpec:
        # Retention period for metrics
        retention: 5d
        # Storage configuration
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi
        # Resource limits
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            cpu: 2000m
            memory: 6Gi
        # Select all ServiceMonitors across namespaces
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false

    # Alertmanager configuration
#    alertmanager:
#      alertmanagerSpec:
#        storage:
#          volumeClaimTemplate:
#            spec:
#              accessModes:
#                - ReadWriteOnce
#              resources:
#                requests:
#                  storage: 10Gi
#        resources:
#          requests:
#            cpu: 100m
#            memory: 256Mi

    grafana:
      enabled: true

    nodeExporter:
      enabled: true

    kubeStateMetrics:
      enabled: true
